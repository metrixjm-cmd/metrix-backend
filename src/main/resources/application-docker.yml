spring:
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}

metrix:
  google-cloud:
    bucket-name: ${GCS_BUCKET_NAME}
    project-id: ${GCS_PROJECT_ID:}
    credentials-path: ${GCS_CREDENTIALS_PATH:}
    local-fallback-enabled: false
    local-evidence-endpoint-enabled: false
    signed-urls-enabled: true
    signed-url-duration-minutes: ${GCS_SIGNED_URL_DURATION_MINUTES:60}

  security:
    jwt:
      secret-key: ${METRIX_SECURITY_JWT_SECRET_KEY}
  analytics:
    url: ${METRIX_ANALYTICS_URL}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

# En producción la documentación OpenAPI/Swagger se desactiva para no exponer
# la superficie completa de la API públicamente (defensa en profundidad).
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: INFO
    org.springframework.data.mongodb: WARN
    com.metrix.api: INFO

