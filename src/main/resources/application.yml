server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: METRIX-API

  # MongoDB
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/metrix_db}

  # Archivos
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  lifecycle:
    timeout-per-shutdown-phase: 15s

  # Desactivar auto-config de Redis (no lo usamos en modo single-instance)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Configuración personalizada de METRIX
metrix:
  google-cloud:
    bucket-name: ${GCS_BUCKET_NAME:metrix-evidences}
    project-id: ${GCS_PROJECT_ID:}
    credentials-path: ${GCS_CREDENTIALS_PATH:}
    local-fallback-enabled: ${GCS_LOCAL_FALLBACK_ENABLED:true}
    local-evidence-endpoint-enabled: ${GCS_LOCAL_EVIDENCE_ENDPOINT_ENABLED:true}
    signed-urls-enabled: ${GCS_SIGNED_URLS_ENABLED:true}
    signed-url-duration-minutes: ${GCS_SIGNED_URL_DURATION_MINUTES:60}

  security:
    jwt:
      secret-key: ${METRIX_SECURITY_JWT_SECRET_KEY:bWV0cml4LWRldi1zZWNyZXQta2V5LWZvci1sb2NhbC1kZXZlbG9wbWVudC1vbmx5LTI2Ynl0ZXM=}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  analytics:
    url: ${METRIX_ANALYTICS_URL:http://localhost:8001/api/v1/analytics}
    api-key: ${METRIX_API_KEY:dev-internal-key}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080}

# Logging
logging:
  level:
    root: INFO
    org.springframework.data.mongodb: ${LOG_LEVEL_MONGO:WARN}
    com.metrix.api: ${LOG_LEVEL_APP:INFO}
    com.metrix.api.security: ${LOG_LEVEL_SECURITY:WARN}

